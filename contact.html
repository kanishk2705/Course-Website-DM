<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | AlgoForge</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C3T1CXGMNX"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag() { dataLayer.push(arguments); } gtag('js', new Date()); gtag('config', 'G-C3T1CXGMNX');</script>
</head>

<body>
    <nav class="navbar">
        <div class="logo">Algo<span>Forge</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="blog.html">Tutorials</a></li>
            <li><a href="login.html" class="btn-nav">Log In</a></li>
            <li><a href="register.html" class="btn-primary">Sign Up</a></li>
        </ul>
    </nav>

    <main class="utility-page">
        <div class="utility-header">
            <h1>Contact Support</h1>
            <p>Have a question about the curriculum or need technical assistance? We are here to help.</p>
        </div>

        <div class="utility-content contact-layout">
            <div class="contact-info">
                <h3>Direct Inquiries</h3>
                <p><strong>Email:</strong> support@algoforge.com</p>
                <p><strong>Hours:</strong> Monday - Friday, 9:00 AM - 6:00 PM (IST)</p>
            </div>

            <form class="auth-form contact-form" action="#" method="GET">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Your email address" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="How can we help?" required
                        style="width: 100%; padding: 0.8rem; border-radius: 4px; border: 1px solid #374151; background: #1f2937; color: white;"></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </main>

</body>

</html>
